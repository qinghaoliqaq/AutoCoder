# AI Dev Hub — Director Configuration
#
# Copy this file to config.toml and fill in your values.
# config.toml is git-ignored so your API key stays private.
#
# Environment variable overrides (highest priority):
#   DIRECTOR_API_KEY      or  AGENT_MINIMAX_API_KEY
#   DIRECTOR_BASE_URL     or  AGENT_MINIMAX_BASE_URL
#   DIRECTOR_MODEL        or  AGENT_MINIMAX_MODEL
#   DIRECTOR_API_FORMAT                               ("openai" | "anthropic")
#   AI_DEV_HUB_VENDORED_SKILLS                       ("true" | "false")
#   AI_DEV_HUB_MAX_PARALLEL_SUBTASKS                 (1-8)
#   AI_DEV_HUB_EXECUTION_ACCESS_MODE                 ("sandbox" | "full_access")
#
# ── api_format options ────────────────────────────────────────────────────────
#
#   "openai"     OpenAI-compatible wire format
#                  endpoint : {base_url}/chat/completions
#                  auth     : Authorization: Bearer <api_key>
#                  providers: OpenAI, Groq, Ollama, Azure OpenAI, etc.
#
#   "anthropic"  Anthropic-compatible wire format
#                  endpoint : {base_url}/messages
#                  auth     : x-api-key: <api_key>
#                  providers: Anthropic Claude, MiniMax, and compatible proxies
#
# ── Provider examples ─────────────────────────────────────────────────────────
#
#   OpenAI
#     base_url   = "https://api.openai.com/v1"
#     model      = "gpt-4o"
#     api_format = "openai"
#
#   Anthropic Claude
#     base_url   = "https://api.anthropic.com/v1"
#     model      = "claude-sonnet-4-6"
#     api_format = "anthropic"
#
#   MiniMax (Anthropic-compatible proxy)
#     base_url   = "http://<host>/api"
#     model      = "MiniMax-M2.5"
#     api_format = "anthropic"
#
#   Groq
#     base_url   = "https://api.groq.com/openai/v1"
#     model      = "llama-3.3-70b-versatile"
#     api_format = "openai"
#
#   Ollama (local)
#     base_url   = "http://localhost:11434/v1"
#     model      = "llama3.2"
#     api_format = "openai"

[director]
api_key    = "your-api-key-here"
base_url   = "https://api.openai.com/v1"
model      = "gpt-4o"
api_format = "openai"

# Approximate token budget for conversation history.
# When estimated history tokens exceed this, older messages are compacted
# into a structured summary instead of being silently discarded.
# Increase for models with large context windows (e.g. 128k).
# Override with env var: DIRECTOR_CONTEXT_BUDGET
# context_budget = 24000

# ── Agent layer (skill execution via Anthropic API tool_use) ──────────────────
#
# When configured, skills (plan, code, debug, test, review) run through
# direct Anthropic API calls with tool_use instead of spawning CLI processes.
# Tools (Bash, TextEditor, Grep, Glob) are executed locally in Rust.
# No CLI installation required — just an API key.
#
# Environment variable overrides:
#   AGENT_API_KEY      Anthropic API key (or cloud provider key)
#   AGENT_BASE_URL     Custom base URL (proxy / self-hosted)
#   AGENT_MODEL        Model for skill execution
#   AGENT_PROVIDER     "anthropic" | "bedrock" | "vertex" | "foundry"

[agent]
# api_key  = "sk-ant-..."
# base_url = ""                  # leave empty for Anthropic default
# model    = "claude-sonnet-4-6"
# provider = "anthropic"         # anthropic | bedrock | vertex | foundry

[features]
# Enable packaged vendored helper skills such as MiniMax frontend-dev/fullstack-dev.
# These are injected by the app orchestrator and never written to user-global skill dirs.
vendored_skills = true

# Bounded lane count for code-mode subtask execution.
# Each lane gets an isolated Claude implementation pass followed by Codex review.
max_parallel_subtasks = 5

# Global execution privilege for write-capable agents.
# "sandbox" keeps Codex in workspace-write sandbox and Claude in safer permission mode.
# "full_access" removes execution restrictions for write passes. Review / QA remain read-only.
execution_access_mode = "sandbox"
