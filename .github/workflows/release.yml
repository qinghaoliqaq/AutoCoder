name: Release

# Trigger:
#   - Push a tag like `v0.1.0` → builds + creates a draft GitHub Release
#     with installers for Windows, macOS (universal), and Linux.
#   - Push a branch like `release/v0.1.0` → same as above, but the tag is
#     created by tauri-action at the branch HEAD (useful when tag push is
#     restricted by the git hosting / proxy).
#   - Manual `workflow_dispatch` → builds only, uploads as artifacts
#     (useful for testing the build without cutting a release).
#
# Signing is intentionally NOT configured — the artifacts will show an
# "unverified developer" warning on first launch.  To enable signing
# later, add these secrets and uncomment the matching env vars below:
#
#   macOS (Apple Developer, $99/yr):
#     APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#     APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#
#   Windows (EV cert, ~$300/yr):
#     TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD

on:
  push:
    tags:
      - 'v*'
    branches:
      # `release/vX.Y.Z` branches are a release-trigger convention: pushing one
      # causes this workflow to build + publish a draft GitHub Release for the
      # version embedded in the branch name.  This exists because some CI
      # environments (proxied git, restricted tokens) cannot push tags directly
      # to the remote — creating a branch is always allowed.  The workflow then
      # has tauri-action create the actual `vX.Y.Z` tag at the branch HEAD.
      - 'release/v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — single universal binary (Intel + Apple Silicon)
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Linux — .deb, .rpm, .AppImage
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          # Windows — .msi and .exe (NSIS)
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            file \
            libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Determine whether this run should publish a release, and under
      #    which tag name.  Covers both the `refs/tags/v*` and the
      #    `refs/heads/release/v*` entry points (see `on:` above).
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            PUBLISH=true
          elif [[ "${GITHUB_REF}" == refs/heads/release/v* ]]; then
            TAG="${GITHUB_REF_NAME#release/}"
            PUBLISH=true
          else
            TAG=""
            PUBLISH=false
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag='${TAG}' publish=${PUBLISH}"

      # ── Release run: build + attach to draft GitHub Release ────────────
      - name: Build & publish (release)
        if: steps.tag.outputs.publish == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: 'FlowForge ${{ steps.tag.outputs.tag }}'
          releaseBody: |
            ## FlowForge ${{ steps.tag.outputs.tag }}

            Download the installer for your platform below.

            > Note: Binaries are **not code-signed**.  macOS will show
            > an "unverified developer" warning on first launch — open
            > System Settings → Privacy & Security → "Open Anyway" to
            > allow it.  Windows SmartScreen may also require a click
            > through on first run.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ── Manual dispatch: build only, upload as artifact ────────────────
      - name: Build only (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.app.tar.gz
          if-no-files-found: ignore
          retention-days: 7
